<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Проекты</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="header-content">
            <a th:href="@{/}" class="logo">Учет проектов</a>
            <nav class="nav">
                <a th:href="@{/projects}" class="nav-link active">Проекты</a>
                <a th:href="@{/departments}" class="nav-link">Отделы</a>
                <a th:href="@{/employees}" class="nav-link">Сотрудники</a>
                <span class="user-info" th:text="${#authentication.name}"></span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline btn-sm">Выйти</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Проекты</h1>
            <a th:href="@{/admin/projects/new}" class="btn btn-primary">Добавить проект</a>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table">
                    <thead>
                    <tr>
                        <th>Название</th>
                        <th>Стоимость</th>
                        <th>Отдел</th>
                        <th>Начало</th>
                        <th>План окончания</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="project : ${projects}">
                        <td th:text="${project.name}"></td>
                        <td class="cost-column" th:text="${#numbers.formatDecimal(project.cost, 0, 'COMMA', 2, 'POINT') + ' ₽'}"></td>
                        <td th:text="${project.department?.name} ?: '—'"></td>
                        <td class="date-column">
                            <span th:if="${project.dateBeg != null}" th:text="${#temporals.format(project.dateBeg, 'dd.MM.yyyy')}"></span>
                            <span th:if="${project.dateBeg == null}">—</span>
                        </td>
                        <td class="date-column">
                            <span th:if="${project.dateEnd != null}" th:text="${#temporals.format(project.dateEnd, 'dd.MM.yyyy')}"></span>
                            <span th:if="${project.dateEnd == null}">—</span>
                        </td>
                        <td>
                            <div th:if="${project.dateEndReal != null}" class="status-completed">
                                <span class="badge badge-success">Завершен</span>
                                <span th:text="${#temporals.format(project.dateEndReal, 'dd.MM.yyyy')}" class="completed-date"></span>
                            </div>
                            <span th:if="${project.dateEndReal == null}" class="badge badge-warning">В работе</span>
                        </td>
                        <td>
                            <div class="d-flex gap-2">
                                <a th:href="@{/admin/projects/edit/{id}(id=${project.id})}" class="btn btn-outline-warning btn-sm">Изменить</a>
                                <a th:href="@{/admin/projects/delete/{id}(id=${project.id})}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Удалить проект?')">Удалить</a>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${projects == null or projects.empty}">
                        <td colspan="7" class="text-center text-muted">Нет проектов для отображения</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>
</body>
</html>
