<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Отдел</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="header-content">
            <a th:href="@{/}" class="logo">Бухгалтерия</a>
            <nav class="nav">
                <a th:href="@{/projects}" class="nav-link">Проекты</a>
                <a th:href="@{/departments}" class="nav-link">Отделы</a>
                <a th:href="@{/employees}" class="nav-link">Сотрудники</a>
                <a th:href="@{/reports}" class="nav-link">Отчеты</a>
                <span class="user-info" th:text="${#authentication.name}"></span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline btn-sm">Выйти</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title" th:text="${pageTitle}">Отдел</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <form th:object="${department}" th:action="${department.id != null} ? @{/departments/{id}(id=${department.id})} : @{/departments}" method="post">
                    <div class="form-group">
                        <label class="form-label">Название отдела</label>
                        <input type="text" class="form-control" th:field="*{name}" required>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${department.id != null} ? 'Обновить' : 'Создать'"></span> отдел
                        </button>
                        <a th:href="@{/departments}" class="btn btn-outline">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
