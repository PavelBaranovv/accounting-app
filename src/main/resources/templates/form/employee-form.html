<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Сотрудник</title>
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body>
<div class="app-container">
    <header class="header">
        <div class="header-content">
            <a th:href="@{/}" class="logo">Бухгалтерия</a>
            <nav class="nav">
                <a th:href="@{/projects}" class="nav-link">Проекты</a>
                <a th:href="@{/departments}" class="nav-link">Отделы</a>
                <a th:href="@{/employees}" class="nav-link">Сотрудники</a>
                <a th:href="@{/reports}" class="nav-link">Отчеты</a>
                <span class="user-info" th:text="${#authentication.name}"></span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit" class="btn btn-outline btn-sm">Выйти</button>
                </form>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title" th:text="${pageTitle}">Сотрудник</h1>
        </div>

        <div class="card">
            <div class="card-body">
                <div th:if="${success}" class="alert alert-success">
                    <span th:text="${success}"></span>
                </div>
                <div th:if="${error}" class="alert alert-danger">
                    <span th:text="${error}"></span>
                </div>

                <form th:object="${employee}" th:action="${employee.id != null} ? @{/employees/{id}(id=${employee.id})} : @{/employees}" method="post">
                    <div class="form-group">
                        <label class="form-label">Фамилия</label>
                        <input type="text" class="form-control" th:field="*{lastName}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Имя</label>
                        <input type="text" class="form-control" th:field="*{firstName}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Отчество</label>
                        <input type="text" class="form-control" th:field="*{fatherName}">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Должность</label>
                        <input type="text" class="form-control" th:field="*{position}" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Зарплата (₽)</label>
                        <input type="number" class="form-control" th:field="*{salary}" step="0.01" min="0" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Отделы</label>
                        <select class="form-control" th:field="*{departments}" multiple style="height: 150px;" >
                            <option th:each="dept : ${departments}"
                                    th:value="${dept.id}"
                                    th:text="${dept.name}"
                                    th:selected="${employee.departments != null and employee.departments.![id].contains(dept.id)}">
                            </option>
                        </select>
                        <small class="text-muted">Для выбора нескольких отделов удерживайте Ctrl (Cmd на Mac)</small>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <span th:text="${employee.id != null} ? 'Обновить' : 'Создать'"></span> сотрудника
                        </button>
                        <a th:href="@{/employees}" class="btn btn-outline">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
</div>
</body>
</html>
