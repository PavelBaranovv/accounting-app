spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/accounting}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:root}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true

  web:
    resources:
      static-locations: classpath:/static/